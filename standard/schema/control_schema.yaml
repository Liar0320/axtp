schemas:
  ControlConnectBody:
    type: object
    fields:
      - id: 0x01
        name: protocolVersion
        type: uint8
        required: true
        min: 1
        max: 15
        deprecated: false
      - id: 0x02
        name: maxFrameSize
        type: uint16
        required: true
        min: 1
        max: 65535
        deprecated: false
      - id: 0x03
        name: supportedPayloadTypes
        type: bitmap
        required: true
        deprecated: false
      - id: 0x04
        name: supportedRpcEncodings
        type: bitmap
        required: true
        deprecated: false

  ControlAcceptBody:
    type: object
    fields:
      - id: 0x01
        name: sessionId
        type: uint32
        required: true
        deprecated: false
      - id: 0x02
        name: selectedVersion
        type: uint8
        required: true
        min: 1
        max: 15
        deprecated: false
      - id: 0x03
        name: maxFrameSize
        type: uint16
        required: true
        min: 1
        max: 65535
        deprecated: false
